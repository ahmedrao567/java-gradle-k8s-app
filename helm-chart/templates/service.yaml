apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: 80           # the port you access from other pods or port-forward
      targetPort: 8081   # must match containerPort in deployment
      protocol: TCP
      